<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIOT College Bus Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚌 KIOT College Bus Tracker</h1>
    <p>Find your bus route and timing</p>
</header>

<main>
    <h2>Welcome</h2>

    <h1>KIOT Bus Route Finder</h1>

<p>Search all  KIOT bus routes and arrival timings.</p>
    <h3 id="busCount"></h3>

    <input
    type="text"
    id="searchBox"
    placeholder="🔍 Search by Route Number or Bus Stop"
    onkeyup="searchBus()"
>

<div id="busList"></div>
</main>

<script src="buses.js"></script>
<script src="script.js"></script>

</body>
</html>
